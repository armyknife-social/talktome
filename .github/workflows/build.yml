name: Build VoiceReader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project VoiceReader.xcodeproj \
            -scheme VoiceReader \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package App
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p artifact
          cp -R "$APP_PATH" artifact/
          cd artifact && zip -r ../VoiceReader-Simulator.zip *.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceReader-Simulator
          path: VoiceReader-Simulator.zip
          retention-days: 30

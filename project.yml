name: VoiceReader
options:
  bundleIdPrefix: com.voicereader
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: VoiceReader/Info.plist
    CODE_SIGN_ENTITLEMENTS: VoiceReader/VoiceReader.entitlements
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.voicereader.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: true
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

targets:
  VoiceReader:
    type: application
    platform: iOS
    sources:
      - path: VoiceReader
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: VoiceReader/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceReader/VoiceReader.entitlements
    info:
      path: VoiceReader/Info.plist
    entitlements:
      path: VoiceReader/VoiceReader.entitlements
